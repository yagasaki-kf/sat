TOOLTIPS12=PCとドライバコントローラの通信が正常でしたら緑です。通信がされていなければ赤が表示されます。
TOOLTIPS13=現在接続されている軸の自動サーチを開始します。接続が確認された軸はボタン表示されます。
TOOLTIPS14=ドライバと接続するPCのポートを設定します。
TOOLTIPS15=プログラム編集画面に、直接移ることができます。ドライバ未接続でプログラム編集を行うことが出来ます。
TOOLTIPS16=通信速度とCOMポートを設定後、このボタンを押してください。
TOOLTIPS17=通信速度をドライバ内部設定と合わせてください。
TOOLTIPS20=簡易モードを選択すると、位置決め動作が簡単にできる編集テーブル画面に変わります。
TOOLTIPS21=原点復帰を行う事ができます。
TOOLTIPS22=ドライバから、プログラムの読出し、書込みを行います。
TOOLTIPS24=プログラムの“保存、印刷”が可能です。保存したプログラムは“開く”で編集が可能です。
TOOLTIPS25=現在位置取得機能説明。  ①現在位置、Ｐエリア上限,下限のいずれかを選択してください。②書き込みたいSTEP Noを選択。③ジョグ及びインチング動作で、取得したい位置までアクチュエータを移動④現在位置取得のボタンを押すと、任意の場所を書き込むことが出来ます。
TOOLTIPS26=ジョグ動作は速度を、インチング動作は速度と距離を設定してから、動作させてください。
TOOLTIPS27=手動モードか自動モード、サーボON状態、原点復帰の状態を確認することができます。
TOOLTIPS28=標準モードを選択すると、もとのプログラム編集テーブル画面に戻ります。
TOOLTIPS29=編集中のドライバの設定を確認することが出来ます。
TOOLTIPS30=現在の入出力の状態を確認することができます。ランプ点灯はON状態、ランプ消灯はOFF状態で表示されます。
TOOLTIPS31=最大電流設定を100％として、現在の電流指令を確認することができます。
TOOLTIPS32=アラーム履歴をリセットします。
TOOLTIPS33=ロギング画面の表示を上下左右に移動させることが出来ます。中心のボタンは初期位置に戻ります。
TOOLTIPS34=ロギング画面の表示を拡大、縮小表示します。
TOOLTIPS35=ロギングを開始します。
TOOLTIPS36=トリガ機能説明①トリガ機能をチェックすると、トリガモードへ切り替わります。②ＣＨを指定します。③トリガレベルを設定します。④トリガ取得開始ポイントを設定します。⑤スロープを設定します。（＋立ち上がり、－立下り）⑥STARTを押してください。条件にあった箇所からロギングを開始します。
TOOLTIPS37=取得したロギングデータをファイルに保存、印刷、及び保存データを開くことが出来ます。
TOOLTIPS38=各種スケーリングを調整することができます。波形の取得に反映されます。
TOOLTIPS39=各波形の取得内容を設定できます。2chを同時に取得できます。
TOOLTIPS40=ドライバ内部の現在のパラメータを表示しています。
TOOLTIPS41=PC上で編集できるパラメータエリアです。変更部分は赤文字で表示されます。
TOOLTIPS50=ドライバからアクチュエータへの位置指令を確認することができます。
TOOLTIPS51=アクチュエータの実際の現在位置を確認することができます。
TOOLTIPS52=アクチュエータをサーボONすることが出来ます。
TOOLTIPS53=ジョグ動作ができます。ジョグ速度を入力後、左右に動作させてください。
TOOLTIPS54=インチング動作ができます。ジョグ速度と距離を入力後、左右に動作させてください。
TOOLTIPS55=取得する波形の内容を選択してください。
TOOLTIPS56=取得する波形を代入した数値分、オフセット移動することが可能です。
TOOLTIPS57=選択されたステップNo（青いライン）からプログラムをSTARTさせることができます。（但しサーボON、原点復帰が完了してからです。）
TOOLTIPS58=PAUSEボタンを押すと、押した時点でアクチュエータは減速停止を開始します。再度STARTを押すと、残りの動作を再開することが出来ます。
TOOLTIPS59=エラーリセットができます。またPAUSE中に、このボタンを押すと、残りの移動距離がリセットされます。
TOOLTIPS60=パラメータをドライバコントローラからPCへ読み出すことが出来ます。
TOOLTIPS61=パラメータをPCからドライバコントローラへ書き込むことが出来ます。
TOOLTIPS62=パラメータファイルをデータ保存、印刷、及び保存したデータを開くことが出来ます。
TOOLTIPS63=アクチュエータをサーボOFFすることが出来ます。
TOOLTIPS64=現在のアラーム表示の状態を確認できます。
TOOLTIPS65=現在表示されているアラームをリセットすることが出来ます。
TOOLTIPS66=今までのアラーム履歴を発生順に更新します。
TOOLTIPS67=現在のアラーム表示の状態を確認できます。
TOOLTIPS68=位置決め点数64点、Pエリア出力、エリア出力、押付け動作が可能です。
TOOLTIPS69=位置決め点数64点、外部教示機能、Pエリア出力が可能です。押付け動作はできません。
TOOLTIPS70=位置決め点数256点、Pエリア出力、押付け動作が可能です。
TOOLTIPS71=位置決め点数512点、押付け動作が可能です。
TOOLTIPS72=位置決め点数7点、Pエリア出力、エリア出力、押付け動作が可能です。
TOOLTIPS73=位置決め点数3点、Pエリア出力、エリア出力、押付け動作はできません。
TOOLTIPS80=接続スタート画面へ戻ります。
TOOLTIPS81=モニタ画面へ移ります。入出力I/Oの状態とエラー履歴等が確認できます。
TOOLTIPS82=ロギング画面へ移ります。波形データを取得することができます。
TOOLTIPS83=パラメータ編集画面へ移ります。各種パラメータを操作、編集ができます。



