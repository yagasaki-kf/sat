[TOOLTIPS]
TOOLTIPS1=Go to the HELP window.
TOOLTIPS2=Select a language
TOOLTIPS3=Go to the CONNECTION START window.
TOOLTIPS5=Click the logo to move to the THK home page.
TOOLTIPS8=Perform zero return.
TOOLTIPS9=Perform PC communiation setting.
TOOLTIPS10=The connected device is displayed.  Click the button to move to the program edit window.
TOOLTIPS12=Green lamp indicates normal communications between PC and driver controller and red light indicates no communication.
TOOLTIPS13=Start automatic search of an axis connected currently.  The connected axis is displayed by the button.
TOOLTIPS14=Set the PC port to connect to the driver.
TOOLTIPS15=You can directly move to the program edit window.  Program is editable even when the driver is not connected.
TOOLTIPS16=Set the communications speed and COM port and then, click this button.
TOOLTIPS17=Adjust the communications speed to the driver inside settings.
TOOLTIPS20=When the simple mode is selected, there appears the edit table window that enables easy positioning .
TOOLTIPS21=You can perform zero return.
TOOLTIPS22=Read/write a program form/to the driver.
TOOLTIPS24=You can "save" and "print" a program.  The saved program can be edited by "open".
TOOLTIPS25="Description of Present position acquiring function.
(1) Select any one of present position, P area max and min.
(2) Select a STEP No. to write in.
(3) Move the actuator to the position to aquire in the jog and inching operation.
(4) You can write any location by pushing the button about current position getting."
TOOLTIPS26=Set the speed before the jog operation and the speed and distance before the inching operation.
TOOLTIPS27=You can check the manual or automatic mode, servo ON status and zero return status.
TOOLTIPS28=If selecting the srandard mode, you can return to the previous program edit table window.
TOOLTIPS29=You can check the driver settings you are currently editting.
TOOLTIPS30=You can check current I/O status.  The ON status is indicated by the lamp illuminating and the OFF status is indicated by the lamp off. 
TOOLTIPS31=You can check the present current command, assuming the maximum current setting is 100%.
TOOLTIPS32=Reset alarm list.
TOOLTIPS33=You can move up/down and right/left the logging screen.  The center button is cliked to return to the default position.
TOOLTIPS34=Zoom in or out the logging screen image.
TOOLTIPS35=Start logging.
TOOLTIPS36="Description of Trigger function
(1) Check the trigger function to switch to the trigger mode.
(2) Specify a CH.
(3) Set a trigger level.
(4) Set a trigger start point.
(5) Set a slope  (+ UP, - DOWN).
(6) Push the START button to start logging at an acceptable  point."
TOOLTIPS37=You can save and print aquired logging data in a file and open the saved data.
TOOLTIPS38=You can adjust various scalings.  This affects acquisition of a waveform.
TOOLTIPS39=You can set a content to acquire of each waveform.  Data of 2 CHs can be aquired simultaneously.
TOOLTIPS40=Present parameters in the driver are displayed.
TOOLTIPS41=Parameters in this area are editable on PC.  Changes are displayed in red.
TOOLTIPS50=You can check a position command from the driver to the actuator.
TOOLTIPS51=You can check the actual present position of the atuator.
TOOLTIPS52=You can turn on the servo of the actuator.
TOOLTIPS53=You can select the jogging operation.  Enter the jog speed and move it right and left.
TOOLTIPS54=You can select the inching operation.  Enter the jog speed and distance and move it right and left.
TOOLTIPS55=Select a waveform to acquire.
TOOLTIPS56=Offset movement can be made by a value obtained by substitution of a waveform to acquire.
TOOLTIPS57=You can start with a program at the selected step No. (blue line) (only after turning on the servo and completing the zero return).
TOOLTIPS58=When the PAUSE button is pushed, the actuator starts deceleration and stops.  When the START button is pushed again, the remaining operation is restarted.
TOOLTIPS59=You can reset error.  When entering this button during PAUSE, the remaining travel distance is reset.
TOOLTIPS60=You can read a parameter from the driver controller to PC.
TOOLTIPS61=You can write a parameter from PC to the driver controller.
TOOLTIPS62=You can save and print data in a parameter file and open the saved data.
TOOLTIPS63=You can turn off the servo of the actuator.
TOOLTIPS64=You can check the status of present alarm displayed.
TOOLTIPS65=You can clear the alarms currently displayed.
TOOLTIPS66=Alarm list can be updated in chronological order.
TOOLTIPS67=You can check the status of present alarm displayed.
TOOLTIPS68=64-point positioning, P area output, area output, push & hold operation are supported.
TOOLTIPS69=64-point positioning, external teach function, P area output are supported.  Push & hold operation cannot be performed.
TOOLTIPS70=256-point positioning, P area output, push & hold operation are supported.
TOOLTIPS71=512-point positioning and push & hold operation are supported.
TOOLTIPS72=7-point positioning, P area output, area output, push & hold operation are supported.
TOOLTIPS73=3-point positioning, P area output, area output are supported.  The push & hold operation cannot be performed.
TOOLTIPS80=Return to the start connect screen.
TOOLTIPS81=Display the monitor screen. . You can Input I / O,check status and error history, etc.
TOOLTIPS82=Display the rogging screen. You can get rogging data.
TOOLTIPS83=Display the parameter screen. You can edit parameters.

